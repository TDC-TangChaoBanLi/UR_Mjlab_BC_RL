# ── 各任务配置 ──
# 每个任务包含：场景文件、teacher 类名、task_id、深度归一化范围、物体随机化参数

pick_place:
  scene: "pick_place.xml"
  teacher: "PickPlaceTeacher"
  task_id: 0
  depth_range: [0.1, 0.8]
  objects:
    cube:  { x_range: [0.35, 0.55], y_range: [-0.15, 0.15], z: 0.65 }
    plate: { x_range: [0.50, 0.70], y_range: [-0.15, 0.15], z: 0.601 }

push_t:
  scene: "push_t.xml"
  teacher: "PushTTeacher"
  task_id: 1
  depth_range: [0.1, 0.8]
  objects:
    t_shape:      { x_range: [0.35, 0.50], y_range: [-0.10, 0.10], z: 0.152 }
    goal_marker:  { x_range: [0.45, 0.60], y_range: [-0.10, 0.10], z: 0.147 }

peg_slot:
  scene: "peg_in_slot.xml"
  teacher: "PegSlotTeacher"
  task_id: 2
  depth_range: [0.1, 0.8]
  objects:
    peg:        { x_range: [0.35, 0.50], y_range: [-0.10, 0.10], z: 0.162 }
    slot_block: { x_range: [0.50, 0.65], y_range: [-0.10, 0.10], z: 0.152 }
