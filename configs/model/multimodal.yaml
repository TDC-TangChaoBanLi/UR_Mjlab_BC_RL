# ═══════════════════════════════════════════════════════════
# 多模态 Actor 网络架构（BC 和 PPO 共用）
# ═══════════════════════════════════════════════════════════
#
# 输入: camera (4, H, W) + state (7,) + task_id (scalar)
# 输出: action (7,)

# ── 视觉编码器 ───────────────────────────────────────────
visual_encoder:
  type: rescnn          # 编码器类型：rescnn | vit
  in_channels: 4          # RGB(3) + Depth(1)
  image_size: [240, 320]  # (H, W)

  # -- Stem：初始卷积 --
  stem:
    channels: 64
    kernel: 7
    stride: 2
    activation: relu
    group_norm:           # 归一化：batch_norm | group_norm | layer_norm
      num_groups: 8
      eps: 1.0e-3
    max_pool:             # 最大池化；不写则不池化
      kernel: 3
      stride: 2

  # -- 残差阶段 --
  stages:
    - channels: 64
      blocks: 2
      stride: 1
    - channels: 128
      blocks: 2
      stride: 2
    - channels: 256
      blocks: 2
      stride: 2

  # -- 残差块通用参数 --
  stages_cfg:
    kernel_size: 3
    activation: relu
    dropout: 0.0
    group_norm:           # 归一化：batch_norm | group_norm | layer_norm
      num_groups: 8
      eps: 1.0e-3

  # -- 输出头：vector 模式，Pool → Flatten → MLP → [B, D] --
  head:
    adaptive_avg_pool:    # 自适应平均池化
      pool_size: [2, 2]   #   池化到 2×2 → 256×2×2 = 1024
    output:               # 输出层：Linear(1024→512) + LayerNorm
      dim: 512
      layer_norm: true

# ── 状态编码器 ───────────────────────────────────────────
# 有 hidden → MLP；无 hidden → 单层 Linear
state_encoder:
  input_dim: 7            # arm_joint_pos(6) + gripper_pos(1)
  hidden:                 # 隐藏层；不写 → 单层 Linear
    dim: 128
    activation: silu
    layer_norm: false
    dropout: 0.0
  output:                 # 输出层（必写）
    dim: 256
    layer_norm: true

# ── 任务编码器（Embedding） ──────────────────────────────
task_encoder:
  type: embedding         # 编码器类型：embedding
  num_tasks: 3            # 任务数：pick_place(0), push_t(1), peg_slot(2)
  embedding_dim: 64       # 嵌入向量维度
  hidden:                 # 隐藏层
    dim: 128
    activation: relu
    layer_norm: false
  output:                 # 输出层
    dim: 256
    layer_norm: true

# ── 融合模块 ─────────────────────────────────────────────
fusion:
  type: concat            # 融合类型：concat | film
  # concat: 直接拼接 visual+state+task → [B, 768]，无额外参数

# ── 策略 MLP ─────────────────────────────────────────────
policy_mlp:
  hidden_dims: [1024, 512, 128]  # 融合后 → 动作均值的 MLP 隐藏层
  activation: elu                # 激活函数

# ── 动作维度 ─────────────────────────────────────────────
action_dim: 7             # ee_delta(6) + gripper(1)
