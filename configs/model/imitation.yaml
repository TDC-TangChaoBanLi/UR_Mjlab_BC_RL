# ═══════════════════════════════════════════════════════════
# 模仿学习 (BC) 训练配置
# ═══════════════════════════════════════════════════════════
#
# 模型架构来自 configs/model/multimodal.yaml（与 PPO 共用）

# ── 训练超参数 ───────────────────────────────────────────
training:
  epochs: 100
  batch_size: 64
  learning_rate: 0.001
  loss: l1                  # mse | l1 | huber
  val_split: 0.1
  save_every: 10
  seed: 42

# ── 数据加载 ─────────────────────────────────────────────
data:
  num_workers: 4
  pin_memory: true
  prefetch_factor: 2
